version: '3.8'

services:
  proxy-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "5001:5001"
    environment:
      - OPENWEBUI_BASE_URL=http://openwebui:8080
      - OPENWEBUI_VERIFY_SSL=true
      - FLASK_DEBUG=false
      - LOG_LEVEL=INFO
      # Use Redis for shared rate-limit counters across gunicorn workers
      # - RATE_LIMIT_STORAGE_URL=redis://redis:6379/0
    depends_on:
      - openwebui
    networks:
      - proxy-network
    restart: unless-stopped
    volumes:
      - ../logs:/app/logs

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - openwebui-data:/app/backend/data
    networks:
      - proxy-network
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - proxy-network
    restart: unless-stopped

networks:
  proxy-network:
    driver: bridge

volumes:
  openwebui-data:
  ollama-data:
